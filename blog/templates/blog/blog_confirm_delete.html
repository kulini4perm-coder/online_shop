{% extends 'base.html' %}

{% block title %}Удаление статьи{% endblock %}

{% block content %}
{% include 'menu.html' %} <!-- Вставляем подшаблон -->
<div class="container mt-4 text-center">
    <div class="card border-danger mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h3 class="card-title text-danger">Вы уверены?</h3>
            <p>Вы собираетесь удалить статью "<strong>{{ object.title }}</strong>". Это действие нельзя отменить.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'blog:blog_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
