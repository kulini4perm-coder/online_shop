<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Online Shop{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
</head>
<body>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer class="pt-4 my-md-5 pt-md-5 border-top container">
        <div class="row">
            <div class="col-12 col-md">
                <strong>Online Shop</strong>
                <small class="d-block mb-3 text-muted">&copy; 2026</small>
            </div>
            <div class="col-6 col-md">
                <h5>Категории</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="#">Электроника</a></li>
                    <li><a class="text-muted" href="#">Одежда</a></li>
                    <li><a class="text-muted" href="#">Дом и сад</a></li>
                    <li><a class="text-muted" href="#">Аксессуары</a></li>
                </ul>
            </div>
            <div class="col-6 col-md">
                <h5>Поддержка</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="#">Доставка</a></li>
                    <li><a class="text-muted" href="#">Возврат</a></li>
                    <li><a class="text-muted" href="#">Помощь</a></li>
                </ul>
            </div>
            <div class="col-6 col-md">
                <h5>О нас</h5>
                <ul class="list-unstyled text-small">
                    <li><a class="text-muted" href="/contacts/">Контакты</a></li>
                    <li><a class="text-muted" href="#">Адреса магазинов</a></li>
                </ul>
            </div>
        </div>
    </footer>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
