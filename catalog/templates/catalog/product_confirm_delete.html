{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h4>Подтверждение удаления</h4>
        </div>
        <div class="card-body">
            <p class="card-text">Вы уверены, что хотите удалить товар <strong>"{{ object.name }}"</strong>?</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Да, удалить</button>
                <a href="{% url 'catalog:home' %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
